<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Penjualan COTR</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;padding:20px;min-height:100vh}
.wrap{max-width:600px;margin:auto}
.page-title{font-size:20px;font-weight:600;color:#111827;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.page-sub{font-size:13px;color:#6b7280;margin-bottom:20px}
.section{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 20px;margin-bottom:10px}
.sec-title{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.col-header{display:grid;grid-template-columns:1fr 96px 96px;gap:8px;margin-bottom:4px}
.col-header span{font-size:11px;color:#9ca3af;text-align:center}
.col-header span:first-child{text-align:left}
.prod-row{display:grid;grid-template-columns:1fr 96px 96px;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f3f4f6}
.prod-row:last-child{border-bottom:none}
.pname{font-size:14px;font-weight:600;color:#111827}
.pprice{font-size:12px;color:#9ca3af;margin-top:2px}
input[type=number]{width:100%;padding:6px 8px;font-size:13px;border:1px solid #d1d5db;border-radius:8px;background:#f9fafb;color:#111827;text-align:center;transition:border .15s,box-shadow .15s}
input[type=number]:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15);background:#fff}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:13px;color:#374151;font-weight:500}
.field input{text-align:left}
.btn{width:100%;padding:13px;border:none;background:#185FA5;color:#fff;font-size:15px;font-weight:600;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px;transition:background .15s,transform .1s}
.btn:hover{background:#1d4ed8}
.btn:active{transform:scale(.98)}
#hasil{margin-top:12px}
.report{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 20px}
.rtitle{font-size:15px;font-weight:600;color:#111827;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.prod-item{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid #f3f4f6}
.prod-item:last-child{border-bottom:none}
.pi-name{color:#6b7280}
.pi-val{font-weight:600;color:#111827}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.metric{background:#f9fafb;border-radius:8px;padding:10px 12px}
.mlabel{font-size:12px;color:#6b7280;margin-bottom:3px}
.mval{font-size:17px;font-weight:600;color:#111827}
.divider{border:none;border-top:1px solid #f3f4f6;margin:10px 0}
.row-line{display:flex;justify-content:space-between;font-size:13px;padding:5px 0}
.rl-label{color:#6b7280}
.rl-val{font-weight:500;color:#111827}
.rl-plus{font-weight:500;color:#16a34a}
.result-box{border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.result-ok{background:#dcfce7}
.result-warn{background:#fee2e2}
.rlabel{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
.rlabel-ok{color:#15803d}
.rlabel-warn{color:#b91c1c}
.rval{font-size:22px;font-weight:700}
.rval-ok{color:#15803d}
.rval-warn{color:#b91c1c}
.formula-note{font-size:12px;color:#9ca3af;margin-top:8px;text-align:center}.invalid{border:2px solid #ef4444 !important;background:#fef2f2 !important}
</style>
</head>
<body>
<div class="wrap">
  <p class="page-title"><i class="ti ti-chart-bar" aria-hidden="true"></i> Kalkulator penjualan COTR</p>
  <p class="page-sub">Cek selisih antara penjualan produk dan uang yang diterima.</p>

  <div class="section">
    <p class="sec-title"><i class="ti ti-package" aria-hidden="true"></i> Stok produk</p>
    <div class="col-header"><span>Produk</span><span>Awal</span><span>Sisa</span></div>
    <div class="prod-row">
      <div><div class="pname">Premium Kaleng</div><div class="pprice">Rp23.000</div></div>
      <input type="number" id="pk_awal" placeholder="0" min="0">
      <input type="number" id="pk_sisa" placeholder="0" min="0">
    </div>
    <div class="prod-row">
      <div><div class="pname">Chocolate</div><div class="pprice">Rp25.000</div></div>
      <input type="number" id="ch_awal" placeholder="0" min="0">
      <input type="number" id="ch_sisa" placeholder="0" min="0">
    </div>
    <div class="prod-row">
      <div><div class="pname">Vanila</div><div class="pprice">Rp25.000</div></div>
      <input type="number" id="vn_awal" placeholder="0" min="0">
      <input type="number" id="vn_sisa" placeholder="0" min="0">
    </div>
    <div class="prod-row">
      <div><div class="pname">Matcha</div><div class="pprice">Rp18.000</div></div>
      <input type="number" id="mt_awal" placeholder="0" min="0">
      <input type="number" id="mt_sisa" placeholder="0" min="0">
    </div>
    <div class="prod-row">
      <div><div class="pname">Premium Cup</div><div class="pprice">Rp15.000</div></div>
      <input type="number" id="cp_awal" placeholder="0" min="0">
      <input type="number" id="cp_sisa" placeholder="0" min="0">
    </div>
  </div>

  <div class="section">
    <p class="sec-title"><i class="ti ti-credit-card" aria-hidden="true"></i> Pembayaran diterima</p>
    <div class="two-col">
      <div class="field"><label>QRIS</label><input type="number" id="qris" placeholder="0" min="0"></div>
      <div class="field"><label>Cash</label><input type="number" id="cash" placeholder="0" min="0"></div>
    </div>
  </div>

  <div class="section">
    <p class="sec-title"><i class="ti ti-receipt" aria-hidden="true"></i> Pengeluaran</p>
    <div class="two-col">
      <div class="field"><label>Bayar tempat</label><input type="number" id="bayar_tempat" placeholder="0" min="0"></div>
      <div class="field"><label>Pengeluaran lain</label><input type="number" id="pengeluaran_lain" placeholder="0" min="0"></div>
    </div>
  </div>

  <button class="btn" onclick="hitung()"><i class="ti ti-calculator" aria-hidden="true"></i> Hitung</button><button class="btn" onclick="resetForm()" style="margin-top:8px;background:#6b7280"><i class="ti ti-refresh"></i> Reset</button>
  <div id="hasil"></div>
</div>


<script>
function g(id){return Number(document.getElementById(id).value||0)}
function rp(n){return"Rp"+Math.round(n).toLocaleString("id-ID")}

function resetForm(){
 document.querySelectorAll("input").forEach(i=>{
   i.value="";
   i.classList.remove("invalid");
 });
 document.getElementById("hasil").innerHTML="";
 localStorage.clear();
}

document.querySelectorAll("input").forEach(inp=>{
 const saved=localStorage.getItem(inp.id);
 if(saved!==null) inp.value=saved;
 inp.addEventListener("input",()=>localStorage.setItem(inp.id,inp.value));
});

function hitung(){
  document.querySelectorAll("input").forEach(i=>i.classList.remove("invalid"));

  const produk=[
    ["Premium Kaleng","pk_awal","pk_sisa"],
    ["Chocolate","ch_awal","ch_sisa"],
    ["Vanila","vn_awal","vn_sisa"],
    ["Matcha","mt_awal","mt_sisa"],
    ["Premium Cup","cp_awal","cp_sisa"]
  ];

  for(const p of produk){
    const awal=g(p[1]), sisa=g(p[2]);
    if(sisa>awal){
      document.getElementById(p[2]).classList.add("invalid");
      alert("Input tidak valid! Stok sisa "+p[0]+" tidak boleh lebih besar dari stok awal.");
      return;
    }
  }

  const pkQ=g("pk_awal")-g("pk_sisa"),chQ=g("ch_awal")-g("ch_sisa"),
        vnQ=g("vn_awal")-g("vn_sisa"),mtQ=g("mt_awal")-g("mt_sisa"),
        cpQ=g("cp_awal")-g("cp_sisa");

  const pk=pkQ*23000,ch=chQ*25000,vn=vnQ*25000,mt=mtQ*18000,cp=cpQ*15000;
  const totalPenjualan=pk+ch+vn+mt+cp;

  const qris=g("qris"),cash=g("cash"),totalPembayaran=qris+cash;
  const bayarTempat=g("bayar_tempat"),pengeluaranLain=g("pengeluaran_lain");
  const totalPengeluaran=bayarTempat+pengeluaranLain;
  const selisih=totalPembayaran+totalPengeluaran-totalPenjualan;

  let warning="";
  if(totalPenjualan>0 && totalPembayaran<totalPenjualan*0.3){
    warning='<div style="margin:10px 0;padding:10px;background:#fef3c7;border-radius:8px">⚠ Periksa kembali data pembayaran atau stok. Selisih terlihat tidak wajar.</div>';
  }

  const isOk=selisih>=0;
  const items=[
    {name:"Premium Kaleng — "+pkQ+" pcs",val:pk},
    {name:"Chocolate — "+chQ+" pcs",val:ch},
    {name:"Vanila — "+vnQ+" pcs",val:vn},
    {name:"Matcha — "+mtQ+" pcs",val:mt},
    {name:"Premium Cup — "+cpQ+" pcs",val:cp},
  ];

  document.getElementById("hasil").innerHTML=`
  <div class="report">
    <p class="rtitle">Laporan penjualan</p>
    ${warning}
    <div>${items.map(i=>`<div class="prod-item"><span class="pi-name">${i.name}</span><span class="pi-val">${rp(i.val)}</span></div>`).join("")}</div>
    <div class="metrics">
      <div class="metric"><div class="mlabel">Total penjualan</div><div class="mval">${rp(totalPenjualan)}</div></div>
      <div class="metric"><div class="mlabel">Total pembayaran</div><div class="mval">${rp(totalPembayaran)}</div></div>
    </div>
    <div class="row-line"><span class="rl-label">Bayar tempat</span><span class="rl-plus">+ ${rp(bayarTempat)}</span></div>
    <div class="row-line"><span class="rl-label">Pengeluaran lain</span><span class="rl-plus">+ ${rp(pengeluaranLain)}</span></div>
    <div class="result-box ${isOk?'result-ok':'result-warn'}">
      <span>${isOk?'Selisih':'Minus'}</span>
      <span>${isOk?'':'-'}${rp(Math.abs(selisih))}</span>
    </div>
  </div>`;
}
</script>

</body>
  </html>  <div id="hasil"></div>
</div>

<script>
function g(id){return Number(document.getElementById(id).value||0)}
function rp(n){return"Rp"+Math.round(n).toLocaleString("id-ID")}
function hitung(){
  const pkQ=g("pk_awal")-g("pk_sisa"),chQ=g("ch_awal")-g("ch_sisa"),
        vnQ=g("vn_awal")-g("vn_sisa"),mtQ=g("mt_awal")-g("mt_sisa"),
        cpQ=g("cp_awal")-g("cp_sisa");
  const pk=pkQ*23000,ch=chQ*25000,vn=vnQ*25000,mt=mtQ*18000,cp=cpQ*15000;
  const totalPenjualan=pk+ch+vn+mt+cp;
  const qris=g("qris"),cash=g("cash"),totalPembayaran=qris+cash;
  const selisih=totalPembayaran-totalPenjualan;
  const bayarTempat=g("bayar_tempat"),pengeluaranLain=g("pengeluaran_lain");
  const uangBersih=totalPembayaran-bayarTempat-pengeluaranLain;
  const selisihClass=selisih>=0?"selisih-ok":"selisih-warn";
  const selisihLabel=selisih>=0?"Lebih":"Kurang";
  const items=[
    {name:"Premium Kaleng — "+pkQ+" pcs",val:pk},
    {name:"Chocolate — "+chQ+" pcs",val:ch},
    {name:"Vanila — "+vnQ+" pcs",val:vn},
    {name:"Matcha — "+mtQ+" pcs",val:mt},
    {name:"Premium Cup — "+cpQ+" pcs",val:cp},
  ];
  document.getElementById("hasil").innerHTML=`
  <div class="report">
    <p class="report-title">&#128203; Laporan penjualan</p>
    <div>${items.map(i=>`<div class="prod-item"><span class="name">${i.name}</span><span class="val">${rp(i.val)}</span></div>`).join("")}</div>
    <div class="metrics">
      <div class="metric"><div class="mlabel">Total penjualan</div><div class="mval">${rp(totalPenjualan)}</div></div>
      <div class="metric"><div class="mlabel">Total pembayaran</div><div class="mval">${rp(totalPembayaran)}</div></div>
      <div class="metric"><div class="mlabel">QRIS</div><div class="mval">${rp(qris)}</div></div>
      <div class="metric"><div class="mlabel">Cash</div><div class="mval">${rp(cash)}</div></div>
    </div>
    <div class="selisih-row">
      <span class="slabel">Selisih kas</span>
      <span class="${selisihClass}">${selisihLabel} ${rp(Math.abs(selisih))}</span>
    </div>
    <div class="exp-report">
      <div class="exp-item"><span class="elabel">Bayar tempat</span><span class="eval">- ${rp(bayarTempat)}</span></div>
      <div class="exp-item"><span class="elabel">Pengeluaran lain</span><span class="eval">- ${rp(pengeluaranLain)}</span></div>
    </div>
    <div class="bersih-box">
      <span class="bersih-label">&#128176; Uang bersih</span>
      <span class="bersih-val">${rp(uangBersih)}</span>
    </div>
  </div>`;
}
</script>
</body>
</html>
